server {
    listen 80;
    server_name localhost;

    root  /var/www/front;
    index index.php index.html index.htm;

    # Backend API - todas as requisições /api/* vão para o PHP-FPM do back
    # ^~ impede que blocos regex (como \.php$) se sobreponham a este prefixo
    location ^~ /api/ {
        fastcgi_pass  back:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/back/index.php;
        fastcgi_param REQUEST_URI     $request_uri;
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
        include       fastcgi_params;
    }

    # Frontend - arquivos estáticos (HTML, CSS, JS, imagens)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Frontend - arquivos PHP (back/php/*)
    location ~ \.php$ {
        fastcgi_pass  front:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/front$fastcgi_script_name;
        include       fastcgi_params;
    }
}
